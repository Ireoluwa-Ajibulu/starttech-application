name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: starttech-backend
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install dependencies
        working-directory: backend/MuchToDo
        run: go mod download

      - name: Run unit tests
        working-directory: backend/MuchToDo
        run: go test ./... -v
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Run vulnerability scan
        working-directory: backend/MuchToDo
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        continue-on-error: true

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        id: build-image
        working-directory: backend/MuchToDo
        run: |
          ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Scan Docker image for vulnerabilities
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            ${{ steps.build-image.outputs.image_uri }}
        continue-on-error: true

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --targets "Key=tag:aws:autoscaling:groupName,Values=starttech-asg" \
            --document-name "AWS-RunShellScript" \
            --parameters commands=["aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}","docker pull ${{ needs.build.outputs.image_uri }}","docker stop starttech-backend || true","docker rm starttech-backend || true","docker run -d --name starttech-backend -p 8080:8080 -e MONGODB_URI=${{ secrets.MONGODB_URI }} -e REDIS_URL=${{ secrets.REDIS_URL }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} --log-driver=awslogs --log-opt awslogs-region=${{ env.AWS_REGION }} --log-opt awslogs-group=starttech-app-logs ${{ needs.build.outputs.image_uri }}"] \
            --region ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: |
          sleep 30
          ALB_DNS=${{ secrets.ALB_DNS_NAME }}
          response=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/health)
          if [ $response -eq 200 ]; then
            echo "Smoke test passed!"
          else
            echo "Smoke test failed with status $response"
            exit 1
          fi

      - name: Update autoscaling group
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name starttech-asg \
            --preferences MinHealthyPercentage=50
